apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-gateway

resources:
  - namespace.yaml
  - pvc.yaml
  - configmap.yaml
  - secret.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml

images:
  - name: ai-gateway-backend
    newTag: latest
  - name: ai-gateway-frontend
    newTag: latest
