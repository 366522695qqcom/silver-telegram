apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway-backend
  namespace: ai-gateway
  labels:
    app: ai-gateway-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-gateway-backend
  template:
    metadata:
      labels:
        app: ai-gateway-backend
    spec:
      containers:
        - name: backend
          image: ai-gateway-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ai-gateway-config
            - secretRef:
                name: ai-gateway-secret
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: ai-gateway-data-pvc
